<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 曾家世足雲端預測王</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6">
        <h1 class="text-xl font-bold text-center text-blue-600 mb-4">⚽ 2026 曾家世足雲端預測王</h1>
        
        <label class="block text-sm font-bold mb-2">我是誰：</label>
        <select id="userSelect" class="w-full p-3 border rounded-lg mb-6 font-bold bg-gray-50">
            <option>曾爸</option><option>曾媽</option><option>薰虹</option><option>厚任</option><option>禹棠</option><option>晉偉</option><option>俐蓉</option><option>博軒</option>
        </select>

        <div id="matchList" class="space-y-4">讀取賽程中...</div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzT90jb9Tg_M1lqRDCvDoOnArNDgLhKkoBya9Ua-wwWOAPl5G00x6mHhyoNs_ZdD7_H/exec";

        // 1. 讀取賽程
        fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('matchList');
                list.innerHTML = "";
                data.matches.forEach(m => {
                    list.innerHTML += `
                        <div class="border p-4 rounded-xl shadow-sm bg-white">
                            <div class="text-[10px] text-blue-500 font-bold mb-1">${m.stage}</div>
                            <div class="font-bold text-lg mb-2">${m.home} vs ${m.away}</div>
                            <div class="flex gap-2">
                                <button onclick="vote('${m.id}', '${m.home}')" class="flex-1 bg-blue-100 py-2 rounded-lg text-sm font-bold">${m.home}</button>
                                <button onclick="vote('${m.id}', '和局')" class="flex-1 bg-gray-100 py-2 rounded-lg text-sm font-bold">和</button>
                                <button onclick="vote('${m.id}', '${m.away}')" class="flex-1 bg-blue-100 py-2 rounded-lg text-sm font-bold">${m.away}</button>
                            </div>
                        </div>
                    `;
                });
            }).catch(() => {
                document.getElementById('matchList').innerHTML = "讀取失敗，請重新整理";
            });

        // 2. 投票功能（用最古老、最穩定的外開視窗法，絕對不會被 Google 擋）
        function vote(matchId, choice) {
            const user = document.getElementById('userSelect').value;
            if(!confirm(user + " 確定要預測「" + choice + "」嗎？")) return;

            // 把資料直接變成網址的一部分傳過去
            const targetUrl = `${GAS_URL}?user=${encodeURIComponent(user)}&matchId=${encodeURIComponent(matchId)}&choice=${encodeURIComponent(choice)}`;
            
            // 彈出一個新視窗去執行 Google 寫入動作，執行完關掉即可
            window.open(targetUrl, "_blank");
        }
    </script>
</body>
</html>
