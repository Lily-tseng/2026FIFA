<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 曾家世足雲端預測王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            overflow-x: auto !important; 
            display: flex;               
            -webkit-overflow-scrolling: touch; 
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <div id="loadingOverlay" class="fixed inset-0 bg-black/60 flex flex-col items-center justify-center z-50 text-white font-bold text-lg gap-2">
        <span class="text-3xl animate-spin">⚽</span>
        <span>雲端連線同步中，請稍候...</span>
    </div>

    <div class="sticky top-0 z-40 bg-slate-100/95 backdrop-blur-sm pt-4 px-4 pb-2">
        <div class="max-w-md mx-auto bg-white rounded-t-2xl shadow-md border-t border-x border-slate-200 p-6 pb-2">
            <div class="text-center mb-5">
                <h1 class="text-2xl font-bold text-blue-600">⚽ 2026 曾家世足雲端預測王</h1>
                <p class="text-slate-500 text-xs font-bold mt-1">🔥 淘汰賽積分大加碼！誰是最後冠軍</p>
            </div>

            <div class="mb-5 bg-blue-50 p-4 rounded-xl border border-blue-100">
                <label class="block text-sm font-bold text-blue-900 mb-2">👤 我是誰：</label>
                <select id="userSelect" onchange="switchUser()" class="w-full p-2.5 border-2 border-blue-200 rounded-lg bg-white text-base font-bold text-slate-700 shadow-sm focus:outline-none focus:border-blue-500">
                </select>
            </div>

            <div>
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <div class="w-1 h-5 bg-blue-600 rounded-full"></div>
                        <h2 class="text-base font-bold">賽程預測</h2>
                    </div>
                    <div class="flex bg-slate-200 p-0.5 rounded-lg text-xs font-bold">
                        <button id="tabLatest" onclick="switchTab('latest')" class="px-2.5 py-1.5 rounded-md bg-white text-blue-600 shadow-sm">最新 10 場</button>
                        <button id="tabAll" onclick="switchTab('all')" class="px-2.5 py-1.5 rounded-md text-slate-600">全部賽程</button>
                    </div>
                </div>

                <div id="stageButtons" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar font-bold text-xs">
                    <button onclick="switchStage('全部')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-blue-600 text-white shadow-sm">全部</button>
                    <button onclick="switchStage('小組賽')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">小組賽</button>
                    <button onclick="switchStage('32強')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">32強</button>
                    <button onclick="switchStage('16強')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">16強</button>
                    <button onclick="switchStage('8強')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">8強</button>
                    <button onclick="switchStage('準決賽')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">準決賽</button>
                    <button onclick="switchStage('季軍戰')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">季軍戰</button>
                    <button onclick="switchStage('決賽')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">決賽</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="max-w-md mx-auto px-4 pb-8">
        <div class="bg-white rounded-b-2xl shadow-xl border-x border-b border-slate-200 p-6 pt-4">
            <div id="matchList" class="space-y-4 mb-8"></div>

            <div class="flex items-center gap-2 mb-3">
                <div class="w-1 h-5 bg-amber-500 rounded-full"></div>
                <h2 class="text-lg font-bold">目前雲端積分榜 (由高到低)</h2>
            </div>
            <div id="leaderboard" class="bg-slate-50 border border-slate-200 p-4 rounded-xl space-y-3"></div>

            <div class="text-center">
                <button onclick="loadCloudData()" class="mt-6 bg-slate-600 hover:bg-slate-700 text-white text-xs font-bold py-2 px-4 rounded-full shadow transition-all">
                    🔄 手動刷新雲端資料
                </button>
            </div>
        </div>
    </div>

    <script>
        const users = ["曾爸", "曾媽", "薰虹", "厚任", "禹棠", "晉偉", "俐蓉", "博軒"];
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzT90jb9Tg_M1lqRDCvDoOnArNDgLhKkoBya9Ua-wwWOAPl5G00x6mHhyoNs_ZdD7_H/exec";

        let matches = [];
        let predictions = {};
        let currentTab = 'latest';  
        let currentStage = '全部'; 

        // 建立一個對照表，加速計分判定
        const STAGE_SCORES = {
            "16強": 2,
            "8強": 4,
            "準決賽": 6,
            "季軍戰": 8,
            "決賽": 10
        };

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function switchTab(tab) {
            if (currentTab === tab) return;
            currentTab = tab;
            document.getElementById('tabLatest').className = tab === 'latest' ? "px-2.5 py-1.5 rounded-md bg-white text-blue-600 shadow-sm" : "px-2.5 py-1.5 rounded-md text-slate-600";
            document.getElementById('tabAll').className = tab === 'all' ? "px-2.5 py-1.5 rounded-md bg-white text-blue-600 shadow-sm" : "px-2.5 py-1.5 rounded-md text-slate-600";
            renderMatches();
        }

        function switchStage(stage) {
            if (currentStage === stage) return;
            currentStage = stage;
            document.querySelectorAll('.stage-btn').forEach(btn => {
                btn.className = btn.innerText === stage 
                    ? "stage-btn shrink-0 px-3 py-2 rounded-full bg-blue-600 text-white shadow-sm" 
                    : "stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200";
            });
            renderMatches();
        }

        // 解析時間字串：只在下載資料時執行一次（快取化優化）
        function parseAndFormatTime(rawTime) {
            if (!rawTime) return "未定時間";
            let dateObj = new Date(rawTime);
            if (isNaN(dateObj.getTime())) {
                let cleanTime = String(rawTime);
                if (cleanTime.includes('上午') || cleanTime.includes('下午')) {
                    cleanTime = cleanTime.replace('年', '/').replace('月', '/').replace('日', '');
                    const isPM = cleanTime.includes('下午');
                    cleanTime = cleanTime.replace('上午', '').replace('下午', '').trim();
                    const parts = cleanTime.split(' ');
                    if(parts.length === 2) {
                        const timeParts = parts[1].split(':');
                        let hour = parseInt(timeParts[0]);
                        if (isPM && hour < 12) hour += 12;
                        if (!isPM && hour === 12) hour = 0;
                        dateObj = new Date(`${parts[0]} ${hour}:${timeParts[1]}`);
                    }
                }
            }
            if (isNaN(dateObj.getTime())) return rawTime; 
            const mm = dateObj.getMonth() + 1;
            const dd = dateObj.getDate();
            let hh = dateObj.getHours();
            const min = String(dateObj.getMinutes()).padStart(2, '0');
            const weekDays = ["日", "一", "二", "三", "四", "五", "六"];
            const dayOfWeek = weekDays[dateObj.getDay()];
            const ampm = hh >= 12 ? "下午" : "上午";
            hh = hh % 12 || 12; 
            return `${mm}/${dd}(${dayOfWeek}) ${ampm}${hh}:${min}`;
        }

        async function loadCloudData() {
            showLoading(true);
            try {
                const response = await fetch(`${GAS_URL}?_=${Date.now()}`);
                const data = await response.json();
                
                predictions = data.predictions || {};
                users.forEach(u => { if (!predictions[u]) predictions[u] = {}; });

                // 優化點：在這裡就把時間和權重分數算好，存在陣列中，後面不重複計算
                matches = (data.matches || []).map(m => ({
                    ...m,
                    formattedTime: parseAndFormatTime(m.time),
                    isElimination: parseInt(m.id) >= 74,
                    hasScore: m.homeScore !== undefined && m.homeScore !== "" && m.awayScore !== undefined && m.awayScore !== "",
                    weightScore: STAGE_SCORES[m.stage] || 1
                }));
                
                renderMatches();
                calculateScores();
            } catch (error) {
                console.error("讀取錯誤：", error);
                alert("雲端同步失敗，請稍後重試！");
            } finally {
                showLoading(false);
            }
        }

        function initUserSelect() {
            const select = document.getElementById('userSelect');
            select.innerHTML = users.map(u => `<option value="${u}">${u}</option>`).join('');
            select.value = users[0];
        }

        function renderMatches() {
            const currentUser = document.getElementById('userSelect').value;
            const container = document.getElementById('matchList');
            if (!currentUser) return;
            if (matches.length === 0) {
                container.innerHTML = "<p class='text-center text-slate-400 text-sm py-4'>試算表內尚無賽程資料</p>";
                return;
            }

            // 快速過濾與排序
            let displayMatches = currentStage === '全部'
                ? matches.filter(m => !m.result || m.result == 0 || m.result === "").sort((a, b) => new Date(a.time) - new Date(b.time))
                : matches.filter(m => m.stage === currentStage);

            if (currentTab === 'latest' && displayMatches.length > 10) {
                displayMatches = displayMatches.slice(0, 10);
            }

            if (displayMatches.length === 0) {
                container.innerHTML = `<p class='text-center text-slate-400 text-sm py-4'>目前無相關賽程</p>`;
                return;
            }

            // 使用字串組合一次性寫入 DOM，大幅減少瀏覽器渲染負擔
            let htmlBuffer = "";
            displayMatches.forEach(match => {
                const myPred = predictions[currentUser]?.[match.id] || null;
                let statusBadge = "";
                
                if (match.result && match.result != 0) {
                    statusBadge = String(myPred) === String(match.result)
                        ? `<span class="text-green-600 text-xs font-bold">✅ 猜中！</span>`
                        : `<span class="text-red-500 text-xs font-bold">❌ 沒中</span>`;
                }

                let middleAreaHtml = "";
                if (match.hasScore) {
                    middleAreaHtml = `
                        <div class="flex flex-col items-center justify-center px-2">
                            <span class="text-sm font-extrabold bg-slate-100 text-slate-700 px-3 py-1 rounded-full border border-slate-200 shadow-inner">
                                ${match.homeScore} - ${match.awayScore}
                            </span>
                            ${!match.isElimination ? `<span class="text-[10px] mt-1 font-bold ${myPred == 3 ? 'text-slate-500 underline' : 'text-slate-300'}">投和</span>` : ''}
                        </div>
                    `;
                } else {
                    middleAreaHtml = match.isElimination
                        ? `<div class="px-3 flex items-center justify-center"><span class="text-xs font-extrabold text-slate-400 italic tracking-wider bg-slate-100 px-2 py-1 rounded-md border border-slate-200">VS</span></div>`
                        : `<button onclick="savePredCloud('${match.id}', 3)" class="py-2 px-3 text-sm rounded-lg font-bold border transition-all ${myPred == 3 ? 'bg-slate-500 border-slate-500 text-white shadow-md' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}">和</button>`;
                }

                htmlBuffer += `
                    <div class="p-4 border border-slate-200 rounded-xl bg-white shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-1.5">
                                <span class="text-xs font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded">${match.stage || '小組賽'}</span>
                                <span class="text-[10px] font-bold text-red-500 bg-red-50 px-1.5 py-0.5 rounded">猜中得 ${match.weightScore}分</span>
                            </div>
                            <span class="text-[11px] text-slate-400 font-medium">場次 ${match.id} | ${match.formattedTime}</span>
                            ${statusBadge}
                        </div>
                        <div class="flex items-center justify-between gap-2">
                            <button onclick="savePredCloud('${match.id}', 1)" class="flex-1 py-2 px-1 text-sm rounded-lg font-bold border transition-all ${myPred == 1 ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}">${match.home}</button>
                            ${middleAreaHtml}
                            <button onclick="savePredCloud('${match.id}', 2)" class="flex-1 py-2 px-1 text-sm rounded-lg font-bold border transition-all ${myPred == 2 ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}">${match.away}</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = htmlBuffer;
        }

        async function savePredCloud(matchId, choice) {
            const currentUser = document.getElementById('userSelect').value;
            if (!confirm(`❓ 確定要以【 ${currentUser} 】的身分進行預測嗎？`)) return;

            showLoading(true);
            try {
                const details = { 'user': currentUser, 'matchId': matchId, 'choice': choice };
                const formBody = Object.keys(details).map(key => encodeURIComponent(key) + '=' + encodeURIComponent(details[key])).join('&');

                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
                    body: formBody
                });
                
                const result = await response.json();
                if (result.status === "error") {
                    alert(`🚨 儲介失敗：${result.message}`);
                    return;
                }

                // 本地資料立即同步，不再無謂等待
                if (!predictions[currentUser]) predictions[currentUser] = {};
                predictions[currentUser][matchId] = choice;
                renderMatches();
                calculateScores();
            } catch (error) {
                alert("與雲端連線時發生錯誤，請重試！");
                console.error(error);
            } finally {
                showLoading(false);
            }
        }

        function switchUser() { renderMatches(); }

        function calculateScores() {
            const leaderboardContainer = document.getElementById('leaderboard');
            
            const scores = users.map(user => {
                let totalScore = 0;
                const userPreds = predictions[user] || {};
                
                matches.forEach(match => {
                    if (match.result && match.result != 0 && Number(userPreds[match.id]) === Number(match.result)) {
                        totalScore += match.weightScore; // 直接讀取預算好的權重
                    }
                });
                return { name: user, score: totalScore };
            });

            scores.sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, 'zh-Hant'));

            leaderboardContainer.innerHTML = scores.map((s, index) => {
                const rankBadge = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : `#${index + 1}`;
                return `
                    <div class="flex justify-between items-center text-sm p-1.5 rounded ${index === 0 ? 'bg-amber-50/70 border border-amber-100' : ''}">
                        <div class="flex items-center gap-2">
                            <span class="w-6 h-6 flex items-center justify-center text-xs font-bold text-slate-500">${rankBadge}</span>
                            <span class="font-bold ${index === 0 ? 'text-amber-700' : 'text-slate-700'}">${s.name}</span>
                        </div>
                        <span class="${index === 0 ? 'text-amber-600' : 'text-blue-600'} font-bold">${s.score} 分</span>
                    </div>
                `;
            }).join('');
        }

        initUserSelect();
        loadCloudData();
    </script>
</body>
</html>
