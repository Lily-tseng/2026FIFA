<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>曾家世足雲端預測王</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6">
        <h1 class="text-xl font-bold text-center text-blue-600 mb-4">⚽ 2026 曾家世足雲端預測王</h1>
        <div id="status" class="text-center text-sm text-gray-500">同步資料中...</div>
        <div id="matchList" class="space-y-4"></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzT90jb9Tg_M1lqRDCvDoOnArNDgLhKkoBya9Ua-wwWOAPl5G00x6mHhyoNs_ZdD7_H/exec";

        async function init() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                document.getElementById('status').innerText = "";
                const container = document.getElementById('matchList');
                
                data.matches.forEach(m => {
                    container.innerHTML += `
                        <div class="border p-3 rounded-lg shadow-sm">
                            <div class="font-bold">${m.home} vs ${m.away}</div>
                            <div class="text-xs text-gray-400">ID: ${m.id}</div>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('status').innerText = "⚠️ 連線失敗，請稍候重試";
                console.error(e);
            }
        }
        init();
    </script>
</body>
</html>
