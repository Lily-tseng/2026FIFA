<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世足好友雲端預測王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 p-4 text-slate-800">

    <div id="loading" class="text-center mt-20 text-blue-600 font-bold">
        ⏳ 雲端同步中，請稍候...
    </div>

    <div id="app" class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6 hidden">
        <h1 class="text-xl font-bold text-center text-blue-600 mb-4">⚽ 2026 曾家世足雲端預測王</h1>
        <select id="userSelect" onchange="render()" class="w-full p-3 border rounded-lg mb-4 font-bold"></select>
        <div id="matchList" class="space-y-3"></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzT90jb9Tg_M1lqRDCvDoOnArNDgLhKkoBya9Ua-wwWOAPl5G00x6mHhyoNs_ZdD7_H/exec";
        let matches = [];
        let predictions = {};
        const users = ["曾爸", "曾媽", "薰虹", "厚任", "禹棠", "晉偉", "俐蓉", "博軒"];

        async function init() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                matches = data.matches || [];
                predictions = data.predictions || {};
                
                const select = document.getElementById('userSelect');
                users.forEach(u => select.innerHTML += `<option value="${u}">${u}</option>`);
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                render();
            } catch (e) {
                document.getElementById('loading').innerText = "❌ 讀取失敗，請確認 GAS 網址與試算表權限";
            }
        }

        function render() {
            const user = document.getElementById('userSelect').value;
            const list = document.getElementById('matchList');
            list.innerHTML = "";
            
            matches.forEach(m => {
                // 自動處理 ISO 時間格式顯示
                const date = new Date(m.time);
                const timeStr = isNaN(date) ? m.time : date.toLocaleString('zh-TW', {month:'numeric', day:'numeric', hour:'numeric', minute:'numeric'});
                
                list.innerHTML += `
                    <div class="border p-3 rounded-lg text-sm">
                        <div class="text-[10px] text-gray-400">${m.stage} | ${timeStr}</div>
                        <div class="font-bold">${m.home} vs ${m.away}</div>
                    </div>
                `;
            });
        }
        init();
    </script>
</body>
</html>
