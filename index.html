<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世足好友雲端預測王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        .no-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            overflow-x: auto !important; 
            display: flex;               
            -webkit-overflow-scrolling: touch; 
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 text-slate-800">

    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 text-white font-bold text-lg">
        ⏳ 雲端連線同步中，請稍候...
    </div>

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden p-6 border border-slate-200">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-600">⚽ 2026 曾家世足雲端預測王</h1>
            <p class="text-slate-400 text-xs mt-1">全手機即時連線同步版</p>
        </div>

        <div class="mb-6 bg-blue-50 p-4 rounded-xl">
            <label class="block text-sm font-bold text-blue-900 mb-2">我是誰：</label>
            <select id="userSelect" onchange="switchUser()" class="w-full p-2.5 border-2 border-blue-200 rounded-lg bg-white text-base font-bold">
            </select>
        </div>

        <div class="mb-4">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <div class="w-1 h-5 bg-blue-600 rounded-full"></div>
                    <h2 class="text-lg font-bold">賽程預測</h2>
                </div>
                <div class="flex bg-slate-200 p-0.5 rounded-lg text-xs font-bold">
                    <button id="tabLatest" onclick="switchTab('latest')" class="px-2.5 py-1.5 rounded-md bg-white text-blue-600 shadow-sm">最新 10 場</button>
                    <button id="tabAll" onclick="switchTab('all')" class="px-2.5 py-1.5 rounded-md text-slate-600">全部賽程</button>
                </div>
            </div>

            <div id="stageButtons" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar font-bold text-xs">
                <button onclick="switchStage('全部')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-blue-600 text-white shadow-sm">全部</button>
                <button onclick="switchStage('小組賽')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">小組賽</button>
                <button onclick="switchStage('32強')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">32強</button>
                <button onclick="switchStage('16強')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">16強</button>
                <button onclick="switchStage('8強')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">8強</button>
                <button onclick="switchStage('準決賽')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">準決賽</button>
                <button onclick="switchStage('季軍戰')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">季軍戰</button>
                <button onclick="switchStage('決賽')" class="stage-btn shrink-0 px-3 py-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">決賽</button>
            </div>
        </div>
        
        <div id="matchList" class="space-y-4 mb-8"></div>

        <div class="flex items-center gap-2 mb-3">
            <div class="w-1 h-5 bg-amber-500 rounded-full"></div>
            <h2 class="text-lg font-bold">目前雲端積分榜 (由高到低)</h2>
        </div>
        <div id="leaderboard" class="bg-slate-50 border border-slate-200 p-4 rounded-xl space-y-3"></div>

        <div class="text-center">
            <button onclick="loadCloudData()" class="mt-4 bg-slate-600 hover:bg-slate-700 text-white text-xs font-bold py-2 px-4 rounded-full shadow">
                🔄 手動刷新雲端資料
            </button>
        </div>
    </div>
